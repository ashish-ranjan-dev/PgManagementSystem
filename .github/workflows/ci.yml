name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel old runs if a new push happens on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    # Run for both services in parallel
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, pg-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        working-directory: ${{ matrix.service }}
        run: chmod +x ./gradlew

      - name: Build with Gradle
        working-directory: ${{ matrix.service }}
        run: ./gradlew clean build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/build/libs/*.jar
          retention-days: 7

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, pg-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (don't push)
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max