server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  pg-service:
    base-url: ${PG_SERVICE_URL:http://localhost:8082}
    internal-api-key: ${INTERNAL_API_KEY}
  cors:
    # Comma-separated list. Override per environment via ALLOWED_ORIGINS env var.
    # Default: only local dev front-ends.
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
