spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  jpa.open-in-view: false

logging:
  level:
    root: INFO
    com.pgmanagement.authservice: INFO
    org.hibernate: WARN
    org.springframework.security: WARN
    feign: WARN

server:
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false