server:
  port: 8082

spring:
  application:
    name: pg-service
  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

# Shared with auth-service. Loaded from environment only.
app:
  internal-api-key: ${INTERNAL_API_KEY}
